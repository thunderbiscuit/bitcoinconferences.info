<head>

  <meta property="og:description" content="A simple list of upcoming bitcoin conferences worldwide">

<body>
  <div class="page">

      <div class="header-top">

        <p class="site-subtitle">A simple list of upcoming bitcoin conferences worldwide</p>
      </div>
      <nav class="filters">
        <div class="filter-tabs">
          <button id="btn-upcoming" class="filter-btn active">Upcoming</button>
          <button id="btn-past" class="filter-btn">Past</button>
        </div>
        <a
          href="https://github.com/thunderbiscuit/bitcoinconferences.info?tab=readme-ov-file#adding-a-conference"
          target="_blank"
          rel="noopener noreferrer"
          class="add-link"
        >Add a conference ↗</a>
      </nav>
      <div class="header-rule"></div>
    </header>

    <main id="list" class="conference-list"></main>
  </div>

  <script src="conferences.js"></script>
  <script src="app.js"></script>
